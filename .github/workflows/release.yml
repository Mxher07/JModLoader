name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        type: string

env:
  VERSION: ${{ inputs.version }}
  JAVA_VERSION: '24'
  GITHUB_REPO: Mxher07/JModLoader

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: Build main JAR
  # ─────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -q -DskipTests

      - name: Find JAR
        id: jar
        run: |
          JAR=$(find target -name 'jmodloader-*.jar' ! -name 'original-*' | head -n1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jmodloader-jar
          path: ${{ steps.jar.outputs.jar_path }}
          retention-days: 3

  # ─────────────────────────────────────────────────
  # Job 2: Build Windows EXE (Launch4j via Maven plugin)
  # ─────────────────────────────────────────────────
  build-exe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # 下载 build job 的产物
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jmodloader-jar
          path: build/

      - name: Build EXE with Launch4j Maven Plugin
        run: |
          cat > pom-launch4j.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>moe.jmodloader</groupId>
            <artifactId>jmodloader-launch4j</artifactId>
            <version>${{ env.VERSION }}</version>
            <build>
              <plugins>
                <plugin>
                  <groupId>com.akathist.maven.plugins.launch4j</groupId>
                  <artifactId>launch4j-maven-plugin</artifactId>
                  <version>2.5.0</version>
                  <executions>
                    <execution>
                      <id>l4j</id>
                      <phase>package</phase>
                      <goals><goal>launch4j</goal></goals>
                      <configuration>
                        <headerType>gui</headerType>
                        <outfile>target/jmodloader-${{ env.VERSION }}.exe</outfile>
                        <jar>build/jmodloader-${{ env.VERSION }}.jar</jar>
                        <jre>
                          <minVersion>17.0.0</minVersion>
                          <jdkPreference>preferJre</jdkPreference>
                        </jre>
                        <versionInfo>
                          <fileVersion>${{ env.VERSION }}.0</fileVersion>
                          <productVersion>${{ env.VERSION }}</productVersion>
                          <fileName>jmodloader.exe</fileName>
                          <productName>JModLoader</productName>
                          <companyName>JModLoader Team</companyName>
                          <fileDescription>JModLoader - Java Mod Loader</fileDescription>
                          <copyright>Copyright 2024</copyright>
                        </versionInfo>
                      </configuration>
                    </execution>
                  </executions>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF
          mvn package -f pom-launch4j.xml -q

      - name: Check EXE
        id: check_exe
        run: |
          if [ -f "target/jmodloader-${{ env.VERSION }}.exe" ]; then
            echo "exe_exists=true" >> $GITHUB_OUTPUT
            echo "Found EXE: target/jmodloader-${{ env.VERSION }}.exe"
          else
            echo "exe_exists=false" >> $GITHUB_OUTPUT
            echo "WARNING: EXE not found!"
            ls -la target/
          fi

      - name: Upload EXE
        if: steps.check_exe.outputs.exe_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jmodloader-exe
          path: target/jmodloader-${{ env.VERSION }}.exe
          retention-days: 3

  # ─────────────────────────────────────────────────
  # Job 3: Build Windows GUI Installer JAR
  # ─────────────────────────────────────────────────
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # 下载 build job 的产物（主要给 installer 打包参考）
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jmodloader-jar
          path: build/

      - name: Build installer JAR
        run: |
          cd installer
          mvn clean package -q -DskipTests

      - name: Find installer JAR
        id: inst
        run: |
          JAR=$(find target -name 'jmodloader-installer*.jar' ! -name 'original-*' | grep -v sources | grep -v javadoc | head -n1)
          echo "installer_jar=$JAR" >> $GITHUB_OUTPUT

      - name: Upload installer JAR
        uses: actions/upload-artifact@v4
        with:
          name: jmodloader-installer-jar
          path: ${{ steps.inst.outputs.installer_jar }}
          retention-days: 3

  # ─────────────────────────────────────────────────
  # Job 4: Build Linux DEB Package
  # ─────────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 下载 build job 的产物
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jmodloader-jar
          path: build/

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot dpkg-dev debhelper make gzip

      - name: Build DEB
        run: |
          PKG=jmodloader-${{ env.VERSION }}
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/share/jmodloader
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/share/doc/jmodloader

          # Copy JAR (find the actual file, not glob)
          JAR_FILE=$(find build -name 'jmodloader-*.jar' ! -name 'original-*' | head -n1)
          cp "$JAR_FILE" $PKG/usr/share/jmodloader/jmodloader.jar
          cp "$JAR_FILE" $PKG/usr/share/jmodloader/jmodloader-${{ env.VERSION }}.jar

          # CLI wrapper
          cat > $PKG/usr/bin/jml << 'WRAPPER'
          #!/bin/sh
          exec java -jar /usr/share/jmodloader/jmodloader.jar "$@"
          WRAPPER
          chmod +x $PKG/usr/bin/jml

          # Copy installer script
          cp scripts/linux-installer.sh $PKG/usr/share/jmodloader/install.sh
          chmod +x $PKG/usr/share/jmodloader/install.sh

          # DEBIAN/conffiles
          echo "/etc/jmodloader/config.properties" > $PKG/DEBIAN/conffiles

          # DEBIAN/control
          cat > $PKG/DEBIAN/control << CONTROL
          Package: jmodloader
          Version: ${{ env.VERSION }}
          Section: utils
          Priority: optional
          Architecture: all
          Depends: openjdk-17-jre | java-runtime
          Maintainer: JModLoader Team
          Description: JModLoader - Java Mod Loader and Build Tool
           A powerful Java Mod Loader and Build Tool for creating and
           managing Java mods and projects.
          CONTROL

          # DEBIAN/postinst
          cat > $PKG/DEBIAN/postinst << POSTINST
          #!/bin/sh
          if [ -d /usr/bin ] && [ ! -e /usr/bin/jml ]; then
              ln -sf /usr/share/jmodloader/install.sh /usr/bin/jml 2>/dev/null || true
          fi
          POSTINST
          chmod +x $PKG/DEBIAN/postinst

          # copyright
          cat > $PKG/usr/share/doc/jmodloader/copyright << 'CP'
          This package is licensed under MIT.
          CP

          # Build
          mkdir -p output
          dpkg-deb --build $PKG output/
          mv output/$PKG.deb output/jmodloader-${{ env.VERSION }}.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: jmodloader-deb
          path: output/jmodloader-${{ env.VERSION }}.deb
          retention-days: 3

  # ─────────────────────────────────────────────────
  # Job 5: Publish GitHub Release (depends on all above)
  # ─────────────────────────────────────────────────
  publish-release:
    needs: [build, build-exe, build-installer, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts/
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "=== Artifacts ==="
          find artifacts/ -type f | sort
          echo ""
          echo "=== JAR ==="
          ls -lh artifacts/*.jar 2>/dev/null || echo "No JAR found"
          echo "=== EXE ==="
          ls -lh artifacts/*.exe 2>/dev/null || echo "No EXE found"
          echo "=== DEB ==="
          ls -lh artifacts/*.deb 2>/dev/null || echo "No DEB found"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(find artifacts/ -name 'jmodloader-*.jar' ! -name 'original-*' | grep -v installer | head -n1)
          EXE=$(find artifacts/ -name '*.exe' 2>/dev/null | head -n1)
          DEB=$(find artifacts/ -name '*.deb' 2>/dev/null | head -n1)

          echo "JAR: $JAR"
          echo "EXE: $EXE"
          echo "DEB: $DEB"

          ATTACH=()
          [ -n "$JAR" ] && ATTACH+=("$JAR")
          [ -n "$EXE" ] && ATTACH+=("$EXE")
          [ -n "$DEB" ] && ATTACH+=("$DEB")

          if [ ${#ATTACH[@]} -eq 0 ]; then
            echo "ERROR: No artifacts found to attach!"
            exit 1
          fi

          echo "Attaching ${#ATTACH[@]} file(s) to release..."

          gh release create v${{ env.VERSION }} \
            --title "JModLoader v${{ env.VERSION }}" \
            --notes "## JModLoader v${{ env.VERSION }}

  ## Downloads
  $([ -n "$JAR" ] && echo "- **JAR**: \`$(basename $JAR)\`")
  $([ -n "$EXE" ] && echo "- **Windows EXE**: \`$(basename $EXE)\`")
  $([ -n "$DEB" ] && echo "- **Linux DEB**: \`$(basename $DEB)\`")

  ## Installation
  - Windows: Run the EXE installer or use the JAR directly.
  - Linux: \`sudo dpkg -i $(basename $DEB)\`
  - Or download the JAR and run: \`java -jar $(basename $JAR)\`" \
            "${ATTACH[@]}" \
            --repo ${{ env.GITHUB_REPO }}

          echo "Release created successfully!"
